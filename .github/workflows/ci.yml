name: CI

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

  workflow_dispatch:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install clang-format
        run: |
          sudo apt update -y
          sudo apt install -y lsb-release wget software-properties-common gnupg
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/llvm-snapshot.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-snapshot.gpg] http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-21 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt update -y
          sudo apt remove -y clang-format 2>/dev/null || true
          sudo apt install -y clang-format-21
          sudo ln -sf /usr/bin/clang-format-21 /usr/bin/clang-format

      - name: Check code formatting
        run: |
          ./clang-format.sh
          if ! git diff --quiet; then
            git diff
            echo ""
            echo "Please run './clang-format.sh' and commit the changes. Note, that clang-format 21+ is required"
            exit 1
          fi

  contrib-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt install -y python3 python3-pip
          pip3 install --break-system-packages pyyaml

      - name: Check contrib file drift
        run: |
          python3 scripts/generate_yaml_json.py \
            --internal-h src/include/internal.h \
            --check
        working-directory: /home/runner/work/pgexporter/pgexporter/

      - name: Check Grafana dashboard drift
        run: |
          python3 scripts/generate_dashboards.py \
            --template contrib/grafana/postgresql_dashboard.json \
            --check
        working-directory: /home/runner/work/pgexporter/pgexporter/

  build-linux:
    needs: [format-check, contrib-check]
    runs-on: ubuntu-latest
    container:
      image: rockylinux/rockylinux:10

    strategy:
      matrix:
        compiler: [gcc, clang]
        build_type: [Debug, Release]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Install Dependencies
        run: |
          dnf -y install dnf-plugins-core
          dnf config-manager --set-enabled crb
          dnf -y install epel-release
          dnf -y install \
            git gcc clang cmake make \
            libev libev-devel openssl openssl-devel \
            systemd systemd-devel zlib zlib-devel \
            libzstd libzstd-devel lz4 lz4-devel \
            bzip2 bzip2-devel libatomic libyaml-devel \
            python3-docutils \
            check check-devel llvm \
            libasan libubsan \
            iproute net-tools procps-ng \
            shadow-utils util-linux sudo which curl

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install PostgreSQL 17
        run: |
          dnf install -y https://download.postgresql.org/pub/repos/yum/reporpms/EL-10-x86_64/pgdg-redhat-repo-latest.noarch.rpm
          dnf -qy module disable postgresql 2>/dev/null || true
          dnf install -y postgresql17 postgresql17-server postgresql17-contrib postgresql17-libs

      - name: Set Env Path Variable
        run: |
          echo "PATH=/usr/pgsql-17/bin:$PATH" >> $GITHUB_ENV
          echo $PATH

      - name: Build Project
        run: |
          mkdir build
          cd build
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            export CC=/usr/bin/gcc
          else
            export CC=/usr/bin/clang
          fi
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DDOCS=FALSE ..
          make -j$(nproc)

      - name: Create test user
        run: |
          useradd -m -s /bin/bash runner
          echo "runner ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
          chown -R runner:runner $GITHUB_WORKSPACE

      - name: Prepare test directories
        run: |
          mkdir -p /tmp/pgexporter-test/{base,log,pg_log,coverage}
          chown -R runner:runner /tmp/pgexporter-test

      - name: Run Tests
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ] && [ "${{ matrix.build_type }}" = "Debug" ]; then
            su - runner -c "cd $GITHUB_WORKSPACE && export PATH=/usr/pgsql-17/bin:\$PATH && export LLVM_PROFILE_FILE='/tmp/pgexporter-test/coverage/code-%p.profraw' && bash ./test/check.sh ci"
          elif [ "${{ matrix.build_type }}" = "Debug" ]; then
            su - runner -c "cd $GITHUB_WORKSPACE && export PATH=/usr/pgsql-17/bin:\$PATH && bash ./test/check.sh ci"
          fi

      - name: Report coverage summary
        if: matrix.compiler == 'clang' && matrix.build_type == 'Debug'
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/pgexporter-test/coverage/coverage-report-*.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload All Coverage Reports as Artifact
        if: matrix.compiler == 'clang' && matrix.build_type == 'Debug'
        uses: actions/upload-artifact@v5
        with:
          name: coverage-reports-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: /tmp/pgexporter-test/coverage
          retention-days: 90

      - name: Upload Build and Run Logs as Artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: logs-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: /tmp/pgexporter-test/log
          retention-days: 90

  build-macos:
    needs: [format-check]
    runs-on: macos-latest
    env:
      PGEXPORTER_ROOT: ${{ github.workspace }}
      BUILD_DIR: ${{ github.workspace }}/build
      POSTGRESQL_VERSION: "@17"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master
      - name: Install dependencies
        run: |
          brew update
          brew install \
            libev \
            libyaml \
            docutils \
            check \
            postgresql${POSTGRESQL_VERSION} \
            curl
      - name: Add PostgreSQL to PATH
        run: |
          echo "$(brew --prefix postgresql${POSTGRESQL_VERSION})/bin" >> $GITHUB_PATH
      - name: Build with Clang
        run: |
          mkdir -p $BUILD_DIR
          cd $BUILD_DIR
          export CC=$(xcrun -find clang)
          cmake -DCMAKE_BUILD_TYPE=Debug -DDOCS=FALSE ..
          make -j$(sysctl -n hw.ncpu)

      - name: Show logs on failure
        if: failure()
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          cat ./log/pgexporter.log || echo "pgexporter.log not found"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: macos-build-logs
          path: |
            ${{ env.BUILD_DIR }}/log/
            /tmp/*.log
          retention-days: 7

      - name: Upload Generated Documentation Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: macos-generated-docs
          path: ${{ env.BUILD_DIR }}/doc/
          retention-days: 7

  build-rpm:
    needs: [format-check, contrib-check]
    uses: ./.github/workflows/rpm-build.yml
